<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 세종문화아카데미 선정기관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surface:#fff;--border:#E2E0D8;--text:#1A1916;--sub:#6B6860;--dim:#A8A59E;--accent-a:#2D6A4F;--accent-a-bg:#D8F0E6;--accent-b:#4A3F8A;--accent-b-bg:#E8E5F8;--warn:#C0392B;--warn-bg:#FDECEA;--warn-border:#E8B4B0;--gold:#B8860B;--gold-bg:#FDF8E7;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--text);color:#fff;padding:18px 24px 14px;display:flex;align-items:flex-end;justify-content:space-between;}
.header-title{font-size:17px;font-weight:700;}
.header-sub{font-size:11px;color:#999;margin-top:3px;font-family:'DM Mono',monospace;}
.header-meta{font-size:11px;color:#888;font-family:'DM Mono',monospace;text-align:right;}
/* STATS */
.stats-section{background:var(--surface);border-bottom:2px solid var(--border);}
.stats-title{font-size:11px;font-weight:500;color:var(--sub);padding:10px 16px 4px;text-transform:uppercase;letter-spacing:.5px;}
.stats-bar{display:flex;border-top:1px solid var(--border);}
.stat-item{flex:1;padding:12px 14px;border-right:1px solid var(--border);text-align:center;}
.stat-item:last-child{border-right:none;}
.stat-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.stat-lbl{font-size:10px;color:var(--sub);margin-top:2px;}
.stat-warn{color:var(--warn);}
.stat-gold{color:var(--gold);}
.stats-sub{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);}
.stat-sub-item{padding:10px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat-sub-item:nth-child(even){border-right:none;}
.stat-sub-lbl{font-size:10px;color:var(--sub);margin-bottom:3px;}
.stat-sub-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.stat-sub-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-sub-val.a{color:var(--accent-a);}
.stat-sub-val.b{color:var(--accent-b);}
/* FILTERS */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11px;font-weight:500;color:var(--sub);}
input[type=text],select{font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);outline:none;}
input[type=text]:focus,select:focus{border-color:var(--text);}
input[type=text]{width:155px;}
.reset-btn{font-size:12px;color:var(--sub);background:none;border:1px solid var(--border);border-radius:5px;padding:6px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.reset-btn:hover{background:var(--bg);}
.warn-toggle{font-size:12px;padding:6px 10px;border:1px solid var(--warn);border-radius:5px;background:none;color:var(--warn);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.warn-toggle.active{background:var(--warn);color:#fff;}
.count-bar{padding:6px 16px;font-size:11px;color:var(--sub);font-family:'DM Mono',monospace;background:var(--bg);border-bottom:1px solid var(--border);}
/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;padding:8px 10px;font-weight:500;font-size:10px;color:var(--sub);border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap;position:sticky;top:0;z-index:2;text-transform:uppercase;letter-spacing:.4px;}
thead th.right{text-align:right;}
tbody tr.row-main{border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);}
tbody tr.row-main:hover td{background:#F9F8F5;}
tbody tr.row-main.exceed-row td:first-child{border-left:3px solid var(--warn);}
tbody td{padding:8px 10px;vertical-align:middle;}
.td-no{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);width:32px;}
.td-name{font-weight:500;max-width:175px;}
.td-name span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-country{font-size:11px;color:var(--sub);}
.td-month{font-size:10px;color:var(--sub);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-field{font-size:11px;max-width:130px;}
.td-season{font-size:11px;font-family:'DM Mono',monospace;}
.td-num{font-family:'DM Mono',monospace;font-weight:500;text-align:right;white-space:nowrap;font-size:12px;}
.td-num.over{color:var(--warn);}
.td-num.fee{color:var(--gold);}
.td-chevron{width:18px;text-align:right;color:var(--dim);font-size:10px;}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap;}
.badge-a{background:var(--accent-a-bg);color:var(--accent-a);}
.badge-b{background:var(--accent-b-bg);color:var(--accent-b);}
.badge-region{background:var(--bg);border:1px solid var(--border);color:var(--sub);font-size:10px;padding:2px 5px;border-radius:3px;}
.ftag{display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;background:var(--bg);border:1px solid var(--border);color:var(--sub);margin:1px 1px 1px 0;}
tr.row-detail{background:#F7F6F2;}
tr.row-detail td{padding:0;}
.detail-inner{padding:12px 16px 14px 44px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 20px;border-top:1px dashed var(--border);}
.d-item{display:flex;gap:7px;font-size:12px;line-height:1.5;}
.d-key{color:var(--dim);white-space:nowrap;min-width:60px;}
.d-val{color:var(--text);word-break:break-all;}
.d-full{grid-column:1/-1;}
.warn-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:5px;padding:6px 10px;font-size:12px;color:var(--warn);grid-column:1/-1;}
.fee-box{background:var(--gold-bg);border:1px solid #E8D88A;border-radius:5px;padding:6px 10px;font-size:12px;color:var(--gold);grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px 12px;}
.fee-box-item{display:flex;flex-direction:column;}
.fee-box-label{font-size:10px;color:#A07830;}
.fee-box-val{font-weight:600;font-family:'DM Mono',monospace;}
.empty{padding:40px;text-align:center;color:var(--sub);font-size:14px;background:var(--surface);}
</style>
</head>

<div class="header">
  <div>
    <div class="header-title">2026 세종문화아카데미 선정기관 현황</div>
    <div class="header-sub">A보급형 · B패키지형 · 119개 기관 | 강사료 15만원/h · 1회 3시간 기준</div>
  </div>
  <div class="header-meta">기준일: 2026.05.08</div>
</div>

<div class="stats-section">

    <div class="stat-sub-item">
      <div class="stat-sub-lbl">B패키지형 (과목수=강사수, 최대 60h)</div>
      <div class="stat-sub-row">
        <span class="stat-sub-val b" id="ss-b-instr">—</span>
        <span style="font-size:11px;color:var(--sub)">강사</span>
        <span class="stat-sub-val b" id="ss-b-hours">—</span>
        <span style="font-size:11px;color:var(--sub)">시간</span>
        <span class="stat-sub-val b" id="ss-b-fee">—</span>
      </div>
    </div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">필터</span>
  <input type="text" id="q" placeholder="기관명 · 국가 검색" oninput="render()">
  <select id="ot" onchange="render()">

    <option value="A보급형">A보급형</option>
    <option value="B패키지형">B패키지형</option>
  </select>
  <select id="rg" onchange="render()">

  </select>
  <select id="sn" onchange="render()">
    <option value="">시기 전체</option>
    <option value="1분기">1분기</option><option value="2분기">2분기</option><option value="3분기">3분기</option><option value="4분기">4분기</option>
  </select>
  <select id="fd" onchange="render()"><option value="">분야 전체</option></select>
  <button class="warn-toggle" id="warnBtn" onclick="toggleWarn()">⚠ 초과만 보기</button>
  <button class="reset-btn" onclick="resetFilters()">초기화</button>
</div>
<div class="count-bar" id="countBar"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>No</th><th>기관명</th><th>유형</th><th>권역</th><th>국가</th>

        <th class="right">강의회수</th>

    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>

const allF=[...new Set(D.flatMap(d=>d.fields))].sort();

function fmt(n){return n.toLocaleString('ko-KR')+'원';}

function toggleWarn(){
  warnOnly=!warnOnly;
  document.getElementById('warnBtn').classList.toggle('active',warnOnly);
  render();
}

function getFiltered(){
  const q=document.getElementById('q').value.toLowerCase();
  const ot=document.getElementById('ot').value;
  const rg=document.getElementById('rg').value;
  const sn=document.getElementById('sn').value;
  const fd=document.getElementById('fd').value;
  return D.filter(d=>{
    if(q&&!d.agency.toLowerCase().includes(q)&&!d.country.toLowerCase().includes(q))return false;
    if(ot&&d.opType!==ot)return false;
    if(rg&&d.region!==rg)return false;
    if(sn&&d.season!==sn)return false;
    if(fd&&!d.fields.includes(fd))return false;
    if(warnOnly&&!d.hoursExceed&&!d.fieldExceed)return false;
    return true;
  });
}

function render(){

  empty.style.display='none';

    return `

      <td class="td-name"><span title="${d.agency}">${d.agency}</span></td>
      <td><span class="badge ${d.opType==='A보급형'?'badge-a':'badge-b'}">${d.opType}</span></td>

      <td class="td-month" title="${d.month||''}">${d.month||'—'}</td>
      <td class="td-season">${d.season}</td>
      <td class="td-num">${d.calcInstructors}명</td>
      <td>${hTd}</td>

      <td class="td-chevron">▶</td>

    <tr class="row-detail" id="dr${i}" style="display:none">

function toggle(i){
  const el=document.getElementById('dr'+i);
  if(!el)return;
  const isOpen=el.style.display!=='none';
  if(openIdx>=0&&openIdx!==i){
    const p=document.getElementById('dr'+openIdx);
    if(p)p.style.display='none';
  }
  el.style.display=isOpen?'none':'table-row';
  openIdx=isOpen?-1:i;
}

function resetFilters(){
  document.getElementById('q').value='';
  document.getElementById('ot').value='';
  document.getElementById('rg').value='';
  document.getElementById('sn').value='';
  document.getElementById('fd').value='';
  warnOnly=false;
  document.getElementById('warnBtn').classList.remove('active');
  render();
}
