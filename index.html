<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 세종문화아카데미 운영기관 관리</title>

<style>
:root{--bg:#F5F4F0;--surface:#fff;--border:#E2E0D8;--text:#1A1916;--sub:#6B6860;--dim:#A8A59E;
--aa:#2D6A4F;--aa-bg:#D8F0E6;--bb:#4A3F8A;--bb-bg:#E8E5F8;
--warn:#C0392B;--warn-bg:#FDECEA;--warn-bd:#E8B4B0;
--gold:#8A6000;--gold-bg:#FDF6E3;--gold-bd:#E8D88A;
--note:#1A5C8A;--note-bg:#E8F4FD;--note-bd:#A8D4F0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}
.hdr{background:var(--text);color:#fff;padding:16px 20px;display:flex;align-items:flex-end;justify-content:space-between;}
.hdr-title{font-size:16px;font-weight:700;}
.hdr-sub{font-size:11px;color:#999;margin-top:2px;font-family:'DM Mono',monospace;}
.hdr-meta{font-size:11px;color:#888;font-family:'DM Mono',monospace;text-align:right;}
.stats{background:var(--surface);border-bottom:2px solid var(--border);display:flex;}
.si{flex:1;padding:12px 14px;border-right:1px solid var(--border);text-align:center;}
.si:last-child{border-right:none;}
.sn{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.2;}
.sn.sm{font-size:13px;}
.sl{font-size:10px;color:var(--sub);margin-top:2px;}
.sn.gold{color:var(--gold);}
.sn.warn{color:var(--warn);}
.sn.note-c{color:var(--note);}
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.fl{font-size:11px;font-weight:500;color:var(--sub);}
input,select{font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);outline:none;}
input:focus,select:focus{border-color:var(--text);}
input[type=text]{width:150px;}
.btn{font-size:11px;padding:5px 9px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--sub);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn:hover{background:var(--bg);}
.btn-warn{border-color:var(--warn);color:var(--warn);}
.btn-warn.on{background:var(--warn);color:#fff;}
.btn-note{border-color:var(--note);color:var(--note);}
.btn-note.on{background:var(--note);color:#fff;}
.cnt{padding:5px 14px;font-size:11px;color:var(--sub);font-family:'DM Mono',monospace;background:var(--bg);border-bottom:1px solid var(--border);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;padding:7px 9px;font-weight:500;font-size:10px;color:var(--sub);border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap;position:sticky;top:0;z-index:2;text-transform:uppercase;letter-spacing:.3px;}
th.r{text-align:right;}
tbody tr.mr{border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);}
tbody tr.mr:hover td{background:#F9F8F5;}
tbody tr.mr.ex td:first-child{border-left:3px solid var(--warn);}
tbody tr.mr.op td:first-child{border-left:3px solid var(--note);}
tbody tr.mr.ex.op td:first-child{border-left:3px solid var(--warn);}
tbody td{padding:7px 9px;vertical-align:middle;}

/* 현지시간 셀 */
.tz-cell{white-space:nowrap;text-align:center;}
.tz-time{
  font-family:'DM Mono',monospace;
  font-size:15px;
  font-weight:700;
  padding:3px 8px;
  border-radius:6px;
  display:inline-block;
  min-width:60px;
  text-align:center;
  transition:background .3s,color .3s;
}
.tz-time.work{
  background:#EBF5FB;
  color:#1A5C8A;
}
.tz-time.off{
  background:#F2F2F2;
  color:#AAAAAA;
}
.tz-utc{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);display:block;margin-top:2px;text-align:center;}

.tn{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);}
.tname{font-weight:500;max-width:160px;}
.tname span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc{font-size:11px;color:var(--sub);}
.tm{font-size:10px;color:var(--sub);max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ts{font-size:11px;font-family:'DM Mono',monospace;}
.tv{font-family:'DM Mono',monospace;font-weight:500;text-align:right;font-size:11px;white-space:nowrap;}
.tv.ov{color:var(--warn);}
.tv.g{color:var(--gold);}
.tch{width:16px;text-align:right;color:var(--dim);font-size:10px;}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap;}
.ba{background:var(--aa-bg);color:var(--aa);}
.bb{background:var(--bb-bg);color:var(--bb);}
.br{background:var(--bg);border:1px solid var(--border);color:var(--sub);font-size:10px;padding:2px 5px;border-radius:3px;}
.ft{display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;background:var(--bg);border:1px solid var(--border);color:var(--sub);margin:1px 1px 1px 0;}
tr.dr{background:#F7F6F2;}
tr.dr td{padding:0;}
.di{padding:10px 14px 12px 40px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px 18px;border-top:1px dashed var(--border);}
.dk{display:flex;gap:6px;font-size:11px;line-height:1.5;}
.dkl{color:var(--dim);white-space:nowrap;min-width:54px;}
.dkv{color:var(--text);word-break:break-all;}
.df{grid-column:1/-1;}
.box{border-radius:5px;padding:8px 12px;font-size:11px;grid-column:1/-1;}
.fee-box{background:var(--gold-bg);border:1px solid var(--gold-bd);color:var(--gold);display:grid;grid-template-columns:repeat(5,1fr);gap:4px 10px;}
.wb{background:var(--warn-bg);border:1px solid var(--warn-bd);color:var(--warn);}
.nb{background:var(--note-bg);border:1px solid var(--note-bd);color:var(--note);}
.bi{display:flex;flex-direction:column;}
.bil{font-size:9px;opacity:.75;}
.biv{font-weight:600;font-family:'DM Mono',monospace;font-size:12px;}
.empty{padding:40px;text-align:center;color:var(--sub);font-size:13px;background:var(--surface);}
</style>
</head>

function fmtKRW(n){
  if(!n||n===0)return '0원';
  const e=Math.floor(n/100000000);
  const m=Math.floor((n%100000000)/10000);
  if(e>0&&m>0)return e+'억 '+m.toLocaleString()+'만원';
  if(e>0)return e+'억원';
  return m.toLocaleString()+'만원';
}
function fmtShort(n){
  if(!n||n===0)return '—';
  const e=Math.floor(n/100000000);
  const m=Math.floor((n%100000000)/10000);
  if(e>0&&m>0)return e+'억 '+m.toLocaleString()+'만';
  if(e>0)return e+'억';
  return m.toLocaleString()+'만';
}

// 한국 시간 기준 UTC+9, 시차 offset으로 현지 시간 계산
function getLocalTime(tzOffset){
  // 서울 시간 = UTC+9, 브라우저 로컬 기준 UTC 구하기
  const now = new Date();
  const utcMs = now.getTime() + (now.getTimezoneOffset() * 60000);
  // 한국 기준 시차 = tzOffset은 한국 대비 차이 (예: -15 = 한국보다 15시간 느림)
  // 즉 현지 UTC오프셋 = 9 + tzOffset
  const localMs = utcMs + ((9 + tzOffset) * 3600000);
  const local = new Date(localMs);
  const h = local.getUTCHours();
  const m = local.getUTCMinutes();
  return { h, m, str: String(h).padStart(2,'0')+':'+String(m).padStart(2,'0') };
}

function isWorkHour(h){ return h >= 9 && h < 18; }

function tickClocks(){
  document.querySelectorAll('.tz-time[data-tz]').forEach(el=>{
    const tz = parseInt(el.dataset.tz);
    const {h, str} = getLocalTime(tz);
    el.textContent = str;
    if(isWorkHour(h)){
      el.classList.add('work');
      el.classList.remove('off');
    } else {
      el.classList.add('off');
      el.classList.remove('work');
    }
  });
}

function gF(){

  const rg=document.getElementById('rg').value;
  const ot=document.getElementById('ot').value;
  const sn=document.getElementById('sn').value;
  const fd=document.getElementById('fd').value;
  return D.filter(d=>{
    if(q&&!d.agency.toLowerCase().includes(q)&&!d.country.toLowerCase().includes(q))return false;
    if(rg&&d.region!==rg)return false;
    if(ot&&d.opType!==ot)return false;
    if(sn&&d.season!==sn)return false;
    if(fd&&!d.fields.includes(fd))return false;
    if(wO&&!d.hoursExceed&&!d.fieldExceed)return false;
    if(nO&&(!d.opNote||!d.opNote.trim()||['-','nan'].includes(d.opNote.trim())))return false;
    return true;
  });
}

      <td>${tzHtml}</td>
      <td class="tname"><span title="${d.agency}">${d.agency}</span></td>
      <td><span class="badge ${d.opType==='A보급형'?'ba':'bb'}">${d.opType}</span></td>
      <td><span class="br">${d.region}</span></td>
      <td class="tc">${d.country}</td>
      <td style="max-width:130px">${fT||'<span style="color:#ccc">—</span>'}</td>
      <td class="tm" title="${d.month||''}">${d.month||'—'}</td>
      <td class="ts">${d.season}</td>
      <td class="tv">${d.calcInstructors}명</td>
      <td>${hTd}</td>
      <td class="tv">${d.calcSessions}회</td>
      <td class="tv g">${fmtShort(d.calcFee)}</td>
      <td class="tv">${d.flight?fmtShort(d.flight):'—'}</td>
      <td class="tv">${d.visa?d.visa.toLocaleString()+'원':'—'}</td>
      <td class="tch">▶</td>
    </tr>
    <tr class="dr" id="dr${i}" style="display:none"><td colspan="16">
      <div class="di">
        <div class="fee-box box">
          <div class="bi"><div class="bil">강사 수</div><div class="biv">${d.calcInstructors}명</div></div>
          <div class="bi"><div class="bil">인정시간</div><div class="biv">${d.approvedHours}h</div></div>
          <div class="bi"><div class="bil">회수 (3h/회)</div><div class="biv">${d.calcSessions}회</div></div>
          <div class="bi"><div class="bil">강사료</div><div class="biv">${fmtKRW(d.calcFee)}</div></div>
          <div class="bi"><div class="bil">항공+비자</div><div class="biv">${fmtKRW((d.flight||0)+(d.visa||0))}</div></div>
        </div>
        ${isEx?`<div class="box wb">⚠ ${d.hoursExceed?`시간 초과: 신청 ${d.rawHours}h → 인정 ${d.approvedHours}h`:''} ${d.fieldExceed?`강좌수 초과: ${d.fieldCount}개`:''}</div>`:''}
        ${isN?`<div class="box nb">📌 운영비고: ${d.opNote}</div>`:''}
        <div class="dk"><span class="dkl">시차</span><span class="dkv">${tzOffset!=null?'UTC'+(tzOffset>0?'+':'')+tzOffset:'—'}</span></div>
        <div class="dk"><span class="dkl">기관유형</span><span class="dkv">${d.agencyType}</span></div>
        <div class="dk"><span class="dkl">희망월</span><span class="dkv">${d.month||'미정'}</span></div>
        <div class="dk"><span class="dkl">수강인원</span><span class="dkv">${d.capacity||'—'}명</span></div>
        <div class="dk"><span class="dkl">담당자</span><span class="dkv">${d.manager||'—'}</span></div>
        <div class="dk"><span class="dkl">이메일</span><span class="dkv">${d.email||'—'}</span></div>
        <div class="dk"><span class="dkl">전화</span><span class="dkv">${d.phone||'—'}</span></div>
        <div class="dk df"><span class="dkl">신청시간</span><span class="dkv">${d.hours||'—'}</span></div>
        <div class="dk df"><span class="dkl">운영장소</span><span class="dkv">${d.venue||'—'}</span></div>
        ${d.note?`<div class="dk df"><span class="dkl">비고</span><span class="dkv">${d.note}</span></div>`:''}
      </div>
    </td></tr>`;
  }).join('');

  // 렌더 직후 시계 즉시 업데이트
  tickClocks();
}

function tog(i){
  const el=document.getElementById('dr'+i);
  if(!el)return;
  const op=el.style.display!=='none';
  if(openI>=0&&openI!==i){const p=document.getElementById('dr'+openI);if(p)p.style.display='none';}
  el.style.display=op?'none':'table-row';
  openI=op?-1:i;
}
function toggleW(){wO=!wO;document.getElementById('bw').classList.toggle('on',wO);render();}
function toggleN(){nO=!nO;document.getElementById('bn').classList.toggle('on',nO);render();}
function reset(){
  document.getElementById('q').value='';
  ['rg','ot','sn','fd'].forEach(id=>document.getElementById(id).value='');
  wO=false;nO=false;
  document.getElementById('bw').classList.remove('on');
  document.getElementById('bn').classList.remove('on');
  render();
}

render();
// 30초마다 시계 업데이트
setInterval(tickClocks, 30000);
</script>
</body>
</html>
